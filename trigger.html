<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dave Trigger</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    padding: 1rem;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.2rem;
    color: #ff00ff;
    text-align: center;
    margin-bottom: 1rem;
    text-shadow: 0 0 8px rgba(255,0,255,0.4);
  }
  .btn {
    display: block;
    width: 100%;
    padding: 1.4rem 1rem;
    margin-bottom: 0.8rem;
    border: 2px solid #2a2a4a;
    border-radius: 8px;
    background: rgba(42, 42, 74, 0.2);
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    text-align: left;
    cursor: pointer;
    transition: border-color 150ms, background 150ms;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active {
    background: rgba(255, 0, 255, 0.15);
    border-color: #ff00ff;
  }
  .btn .label {
    font-size: 0.7rem;
    color: #ffaa00;
    display: block;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn.fired {
    border-color: rgba(0, 240, 255, 0.3);
    opacity: 0.4;
  }
  #status {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0.5rem;
    text-align: center;
    font-size: 0.8rem;
    color: rgba(224,224,224,0.4);
    background: #0a0a12;
  }
  .custom-area {
    margin-top: 1rem;
    border-top: 1px solid #2a2a4a;
    padding-top: 1rem;
  }
  .custom-area input {
    width: 100%;
    padding: 0.8rem;
    background: rgba(42, 42, 74, 0.2);
    border: 2px solid #2a2a4a;
    border-radius: 6px;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    margin-bottom: 0.5rem;
  }
  .custom-area input:focus {
    outline: none;
    border-color: #ff00ff;
  }
</style>
</head>
<body>

<h1>DAVE TRIGGER</h1>

<button class="btn" data-text="I still use Copilot and I'm fine." onclick="fire(this)">
  <span class="label">Act 1 — Slide 2 (8 Stages)</span>
  "I still use Copilot and I'm fine."
</button>

<button class="btn" data-text="My CSS is pixel-perfect though." onclick="fire(this)">
  <span class="label">Act 2 — Slide 5 (Two Devs)</span>
  "My CSS is pixel-perfect though."
</button>

<button class="btn" data-text="They stole my oil too." onclick="fire(this)">
  <span class="label">Act 3 — Slide 7 (Maduro/Dudamel)</span>
  "They stole my oil too."
</button>

<button class="btn" data-text="Can I at least keep my Gmail?" onclick="fire(this)">
  <span class="label">Act 3 — Slide 9 (Data Sovereignty)</span>
  "Can I at least keep my Gmail?"
</button>

<button class="btn" data-text="No problem." onclick="fire(this)">
  <span class="label">Callback — Slide 4 (Deprecated)</span>
  "No problem."
</button>

<button class="btn" data-text="Sure, I'll help you." onclick="fire(this)">
  <span class="label">Act 5 — KNOCKOUT (use Dave WAV if ready)</span>
  "Sure, I'll help you."
</button>

<div class="custom-area">
  <input type="text" id="custom-text" placeholder="Custom line...">
  <button class="btn" onclick="fireCustom()">
    <span class="label">Custom</span>
    Say it
  </button>
</div>

<div id="status">Tap to trigger · server must be running on localhost:3000</div>

<script>
var statusEl = document.getElementById('status');

function fire(btn) {
  var text = btn.getAttribute('data-text');
  say(text);
  btn.classList.add('fired');
}

function fireCustom() {
  var input = document.getElementById('custom-text');
  var text = input.value.trim();
  if (text) {
    say(text);
    input.value = '';
  }
}

function say(text) {
  statusEl.textContent = 'Sending: ' + text.substring(0, 40) + '...';
  fetch('/say', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: text, voice: 'Samantha' })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    statusEl.textContent = d.ok ? 'Sent!' : 'Error: ' + d.error;
  })
  .catch(function(e) {
    statusEl.textContent = 'Failed: ' + e.message;
  });
}
</script>
</body>
</html>
